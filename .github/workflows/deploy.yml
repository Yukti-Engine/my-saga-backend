name: Deploy backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION: asia-south1
  SERVICE_NAME: backend
  REGISTRY: asia-south1-docker.pkg.dev
  IMAGE_NAME: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-saga-backend/app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit

  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Write Cloud Run service spec
        run: |
          cat > service.yaml << EOF
          apiVersion: serving.knative.dev/v1
          kind: Service
          metadata:
            name: ${{ env.SERVICE_NAME }}
            annotations:
              run.googleapis.com/launch-stage: BETA
          spec:
            template:
              metadata:
                annotations:
                  run.googleapis.com/cloudsql-instances: feisty-audio-471914-d7:asia-south1:my-saga-data
                  autoscaling.knative.dev/minScale: "0"
                  autoscaling.knative.dev/maxScale: "10"
              spec:
                containerConcurrency: 80
                containers:
                  - name: app
                    image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
                    ports:
                      - containerPort: 3000
                    resources:
                      limits:
                        cpu: "1"
                        memory: 512Mi
                    env:
                      - name: NODE_ENV
                        value: production
                      - name: LOG_LEVEL
                        value: info
                    envFrom: []
                    volumeMounts:
                      - name: sqlsocket
                        mountPath: /cloudsql
                  - name: cloud-sql-proxy
                    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
                    args:
                      - "--structured-logs"
                      - "--port=5432"
                      - "--address=0.0.0.0"
                      - "feisty-audio-471914-d7:asia-south1:my-saga-data"
                    resources:
                      limits:
                        cpu: "0.5"
                        memory: 128Mi
                    volumeMounts:
                      - name: sqlsocket
                        mountPath: /cloudsql
                volumes:
                  - name: sqlsocket
                    emptyDir: {}
          EOF

      - name: Deploy to Cloud Run
        run: |
          gcloud run services replace service.yaml \
            --region ${{ env.REGION }} \
            --quiet

      - name: Set secrets
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --update-secrets=DATABASE_URL=DATABASE_URL:latest,MSG91_AUTH_KEY=MSG91_AUTH_KEY:latest,RECAPTCHA_API_KEY=RECAPTCHA_API_KEY:latest,SUPER_TOKEN=SUPER_TOKEN:latest \
            --quiet

      - name: Allow unauthenticated access
        run: |
          gcloud run services add-iam-policy-binding ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)'