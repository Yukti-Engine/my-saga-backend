name: Deploy backend

on:
  workflow_dispatch:

env:
  REGION: asia-south1
  SERVICE_NAME: backend
  REGISTRY: asia-south1-docker.pkg.dev
  IMAGE_NAME: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-saga-backend/app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit

  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: check
    if: github.actor == 'venganese' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4.3.0

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2.1.10
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Inject image into service spec
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ env.IMAGE_NAME }}:${{ github.sha }}|g" service.yaml

      - name: Deploy to Cloud Run
        run: |
          gcloud run services replace service.yaml \
            --region ${{ env.REGION }} \
            --quiet

      - name: Allow unauthenticated access
        run: |
          gcloud run services add-iam-policy-binding ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)'