apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: backend
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/network-interfaces: '[{"network":"default","subnetwork":"default"}]'
        run.googleapis.com/vpc-access-egress: private-ranges-only
        run.googleapis.com/http2: "false"
    spec:
      containerConcurrency: 80
      containers:
        - name: app
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: GOOGLE_CLIENT_ID
              value: 37597246012-gbcbf1aq07h37ltn51fhbh51f4eui59s.apps.googleusercontent.com
            - name: GOOGLE_SENDER_EMAIL
              value: support@mysaga.in
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: DATABASE_URL
                  key: latest
            - name: MSG91_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  name: MSG91_AUTH_KEY
                  key: latest
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ANTHROPIC_API_KEY
                  key: latest
            - name: RECAPTCHA_API_KEY
              value: 6Lcb45AsAAAAAE1M68rsvTqAZfXlNaTEJt_cScLL
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_CLIENT_SECRET
                  key: latest
            - name: GOOGLE_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_REFRESH_TOKEN
                  key: latest
            - name: SUPER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: SUPER_TOKEN
                  key: latest
            - name: OB_PUBLIC_KEY
              value: z6MkksAqcLaAiLA6eQ1chVGrXNMY78Pj1ounaLxGLgEUj7dt
            - name: OB_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: OB_PRIVATE_KEY
                  key: latest
            - name: OB_RECIPIENT_SALT
              valueFrom:
                secretKeyRef:
                  name: OB_RECIPIENT_SALT
                  key: latest
            - name: RAZORPAY_KEY_ID
              value: rzp_live_SuMeBs6j7WQuyi
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: RAZORPAY_KEY_SECRET
                  key: latest
            - name: RAZORPAY_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: RAZORPAY_WEBHOOK_SECRET
                  key: latest
            - name: PLATFORM_TAX_RATE
              value: "0"
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
          args:
            - "--structured-logs"
            - "--port=5432"
            - "--address=0.0.0.0"
            - "feisty-audio-471914-d7:asia-south1:my-saga-data?private-ip=true"
          resources:
            limits:
              cpu: "0.5"
              memory: 128Mi
